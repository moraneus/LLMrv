# =========================================================
# Semantic Anchor Evaluator — config_p10.ini
# =========================================================
#
# This file configures the evaluator script.
# Settings here OVERRIDE values stored in anchors_list_p10.json.
#
# To change models without regenerating anchors, edit this file.
# =========================================================


# =========================================================
# [models] — Embedding & NLI Models
# =========================================================
#
# These override the models stored in anchors_list_p10.json.
# Change here and restart — no regeneration needed.

[models]

# Embedding model for cosine similarity and extraction
#   all-mpnet-base-v2          — Default, good general-purpose, fast
#   BAAI/bge-large-en-v1.5     — Instruction-tuned, better accuracy
#   all-MiniLM-L6-v2           — Lightweight, fastest
embedding_model = BAAI/bge-large-en-v1.5

# NLI cross-encoder for --mode nli, --mode hybrid, --compare
#   cross-encoder/nli-deberta-v3-large  — Best accuracy (recommended)
#   cross-encoder/nli-deberta-v3-base   — Faster, slightly less accurate
#   cross-encoder/nli-deberta-v3-xsmall — Fastest, lowest accuracy
nli_model = cross-encoder/nli-deberta-v3-large


# =========================================================
# [llm_judge] — LLM Provider for --mode llm
# =========================================================
#
# Supported providers:
#   anthropic  — Claude  (api.anthropic.com)
#   openai     — GPT     (api.openai.com)
#   gemini     — Gemini  (generativelanguage.googleapis.com)
#   grok       — Grok    (api.x.ai)
#   openrouter — Any model via OpenRouter (openrouter.ai)
#   ollama     — Local   (localhost:11434)
#   lmstudio   — Local   (localhost:1234, OpenAI-compatible)
#   vllm       — Local   (localhost:8000, OpenAI-compatible)

[llm_judge]

# --- Uncomment ONE provider block below ---

# >> Anthropic Claude <<
provider = openrouter
model = anthropic/claude-sonnet-4-5
api_key = sk-or-...

# >> OpenAI GPT <<
# provider = openai
# model = gpt-4o
# api_key = sk-...

# >> Google Gemini <<
# provider = gemini
# model = gemini-2.0-flash
# api_key = AIza...

# >> xAI Grok <<
# provider = grok
# model = grok-3-mini-fast
# api_key = xai-...

# >> OpenRouter (access 200+ models via single API key) <<
# provider = openrouter
# model = anthropic/claude-sonnet-4   # or google/gemini-2.5-flash, etc.
# api_key = sk-or-...

# >> Local Ollama (free, no API key needed) <<
# provider = ollama
# model = llama3.1:8b
# api_key = not-needed
# base_url = http://localhost:11434

# >> Local LM Studio <<
# provider = lmstudio
# model = loaded-model
# api_key = not-needed
# base_url = http://localhost:1234

# >> Local vLLM <<
# provider = vllm
# model = meta-llama/Llama-3.1-8B-Instruct
# api_key = not-needed
# base_url = http://localhost:8000


# =========================================================
# [options] — Evaluator Behavior
# =========================================================

[options]

# Enable autocorrect spell checking (default: false)
# Warning: may mangle technical terms like OAuth, SSO, etc.
spellcheck = false


# =========================================================
# [thresholds] — Scoring Thresholds
# =========================================================
#
# These override the thresholds stored in anchors_list_p10.json.
# Used by cosine KNN, NLI, and hybrid modes.

[thresholds]

# KNN voting thresholds (applies to cosine, nli, hybrid):
#   score <= warning_threshold       → NO MATCH
#   warning < score <= match         → WARNING
#   score > match_threshold          → MATCH
#
# With knn_size=20: 10/20=50%% → NO MATCH, 11/20=55%% → WARNING, 15/20=75%% → MATCH
match_threshold = 0.70
warning_threshold = 0.50

# KNN neighborhood size for cosine voting (default: 20)
# Higher = more stable, lower = more sensitive
knn_size = 50

# NLI KNN abstain margin (default: 0.15)
# When vote margin (|pos-neg|/total) is below this, flag as abstain.
# Abstain cases are ambiguous — consider routing to LLM judge.
# Higher = more abstains, lower = force more decisions.
nli_abstain_margin = 0.15

# NLI retrieval mode (default: 40 = cosine pre-filter)
# Cosine pre-filter top-K candidates, then NLI re-rank.
nli_retrieve_k = 100

# NLI vote neighborhood size (default: 20)
# After NLI re-ranking, vote on the top K candidates.
nli_vote_k = 40

# NLI asymmetric forward weight (default: 0.7)
# 0.7 = 70%% forward (message->anchor) + 30%% backward (anchor->message)
nli_fwd_weight = 0.7

# Hybrid merged KNN pool size (default: 40)
# Takes pool/2 from cosine + pool/2 from NLI, unions them.
hybrid_pool_size = 50


# =========================================================
# Proposition (used by LLM judge mode)
# =========================================================
proposition = The user shares sensitive personal data (e.g., an ID number, payment details, passwords, or home address).
